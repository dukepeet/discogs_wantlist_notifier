name: Check Discogs wantlist for new versions

on:
  schedule:
    # Runs weekly, Monday 09:00 UTC. Adjust as you like: https://crontab.guru
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      test_email:
        description: "Send a test email instead of checking the wantlist (to verify SMTP setup)"
        type: boolean
        default: false

jobs:
  check-wantlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Checkout state data repo
        uses: actions/checkout@v7
        with:
          repository: ${{ secrets.STATE_REPO }}
          token: ${{ secrets.STATE_REPO_TOKEN }}
          path: data

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wantlist check
        env:
          TEST_EMAIL: ${{ (github.event.inputs.test_email == 'true') && '1' || '0' }}
          MARKETPLACE_PRICE_LIMIT_EUR: ${{ secrets.MARKETPLACE_PRICE_LIMIT_EUR }}
          STATE_DIR: data
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          DISCOGS_USERNAME: ${{ secrets.DISCOGS_USERNAME }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python scripts/check_wantlist.py

      - name: Commit updated state to data repo
        working-directory: data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json state_readable.md
          git diff --cached --quiet || git commit -m "Update wantlist version state"
          git push
